# CodeRabbit config — https://docs.coderabbit.ai/reference/configuration
# Learning CRM (Flutter + trimmed self-hosted Supabase). Kept lean on purpose;
# grow path_instructions as conventions in docs/database.md start to bite.
language: en-US

reviews:
  profile: chill                 # learning project — helpful, not nitpicky
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_instructions:
    - path: "**/*.dart"
      instructions: >
        Flutter/Dart. Prefer const constructors; keep widgets small and free of
        business logic; push 'use'-heavy logic into plain Dart classes. Flag
        unhandled async/futures, missing error paths, and use of raw Postgres
        credentials on the client (must go through PostgREST/GoTrue under RLS).
    - path: "**/*.sql"
      instructions: >
        Postgres migrations (Supabase). Enforce docs/database.md: all writes
        (INSERT / UPDATE / soft-delete) go through SECURITY DEFINER RPCs, reads go
        direct-under-RLS (rule #2, Decision 26 — flag a new table whose writes bypass an
        RPC); enable RLS in the SAME migration as CREATE TABLE; soft-delete via deleted_at (no hard DELETE
        except explicitly-annotated exceptions — e.g. join tables task_contacts and event_attendees
        hard-delete membership on the atomic update-and-replace RPC, docs/database.md #4); SELECT policies on mutable tables
        filter deleted_at IS NULL, except event_comments, task_comments and tasks (which use SELECT USING (true)
        for archived items — docs/database.md #4); SECURITY DEFINER functions must
        SET search_path = public (and, once auth is wired — issue #3 — client-facing
        ones must check auth.uid()). As of Decision 36 (2026-07-15) the RPC is now the SOLE write path:
        a new mutable table must grant anon/authenticated SELECT ONLY (no direct INSERT/UPDATE grants and
        no direct write RLS policies — writes go through the RPCs), and a new SECURITY DEFINER function
        must REVOKE EXECUTE … FROM PUBLIC before granting to anon/authenticated — flag a new table with
        direct anon write grants/policies, or a new RPC missing the revoke-from-public, as an issue.
        Auth (GoTrue) is still NOT wired yet, so do NOT flag missing auth.uid() checks on client-facing
        RPCs — but DO still review unexpected anon privilege expansion (grants on new tables/sequences/admin
        RPCs) normally. Use idempotent upserts (ON CONFLICT); migrations are forward-only.

chat:
  auto_reply: true
